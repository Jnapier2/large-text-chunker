name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile source
        run: python -m py_compile src/large_text_chunker.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
